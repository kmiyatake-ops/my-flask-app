<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チェックシート作成</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>新規チェックシート作成</h1>
        <form id="create-form" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">チェックシート名</label>
                <input type="text" id="name" name="name" required placeholder="例: 機械A日常点検">
            </div>
            <div class="form-group">
                <label for="order_number">発注番号</label>
                <input type="text" id="order_number" name="order_number" placeholder="例: PO-2024-001">
            </div>
            <div class="form-group">
                <label for="image">機械画像</label>
                <input type="file" id="image" name="image" accept="image/*" required>
                <div class="preview" id="image-preview"></div>
            </div>
            <button type="submit" class="btn btn-primary">作成して吹き出しを追加</button>
        </form>
        <a href="/" class="btn btn-secondary">戻る</a>
    </div>
    <script src="/static/js/create.js"></script>
</body>
</html>
